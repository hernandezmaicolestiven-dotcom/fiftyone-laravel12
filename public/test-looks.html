<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Looks del Día</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Datos de prueba
    const dbProducts = [
      { id: 1, name: 'Hoodie Oversize Negro', price: 120000, img: 'https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=400&q=80' },
      { id: 2, name: 'Camiseta Boxy Blanca', price: 80000, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&q=80' },
      { id: 3, name: 'Pantalón Cargo Beige', price: 150000, img: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&q=80' },
      { id: 4, name: 'Sudadera Crop Gris', price: 95000, img: 'https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=400&q=80' },
      { id: 5, name: 'Jean Relaxed Azul', price: 130000, img: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&q=80' },
      { id: 6, name: 'Gorra Streetwear', price: 45000, img: 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=400&q=80' },
      { id: 7, name: 'Hoodie Premium Morado', price: 140000, img: 'https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=400&q=80' },
      { id: 8, name: 'Camiseta Oversize Rosa', price: 85000, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&q=80' },
      { id: 9, name: 'Pantalón Wide Leg Negro', price: 160000, img: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&q=80' },
    ];

    window.__AUTH__ = { loggedIn: false };

    const fmt = n => '$ ' + Math.round(parseFloat(n)).toLocaleString('es-CO');

    function LooksDelMes({ onAdd }) {
      const auth = window.__AUTH__ || {};

      console.log('dbProducts:', dbProducts);

      if (!dbProducts || dbProducts.length === 0) {
        console.warn('No hay productos disponibles');
        return null;
      }

      const today = new Date();

      const getProduct = (index) => {
        if (index < dbProducts.length) {
          return dbProducts[index];
        }
        return dbProducts[index % dbProducts.length];
      };

      const looks = [
        {
          title: 'Look Urbano',
          desc: 'Estilo streetwear moderno',
          products: [
            getProduct(0),
            getProduct(1),
            getProduct(2),
          ].filter(Boolean),
          bg: 'from-[#0d0d1a] to-[#1a0a2e]',
        },
        {
          title: 'Look Casual',
          desc: 'Comodidad y estilo',
          products: [
            getProduct(3),
            getProduct(4),
            getProduct(5),
          ].filter(Boolean),
          bg: 'from-[#0a0e2e] to-[#0d0d1a]',
        },
        {
          title: 'Look Premium',
          desc: 'Elegancia oversize',
          products: [
            getProduct(6),
            getProduct(7),
            getProduct(8),
          ].filter(Boolean),
          bg: 'from-[#1a0a2e] to-[#0a0e2e]',
        },
      ];

      console.log('looks:', looks);

      const fechaHoy = today.toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'long' });

      return (
        <section id="inspiracion" className="py-20 bg-gray-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="text-center mb-12">
              <span className="text-[#3B59FF] text-sm font-semibold uppercase tracking-widest">Inspiración</span>
              <h2 className="text-4xl font-black text-gray-900 mt-2">Looks del día</h2>
              <p className="text-gray-500 mt-2 capitalize">Outfits de hoy · {fechaHoy}</p>
            </div>
            <div className="grid md:grid-cols-3 gap-6">
              {looks.map((look,i) => (
                <div key={i} className={`rounded-3xl overflow-hidden bg-gradient-to-br ${look.bg} p-6 text-white`}>
                  <h3 className="font-black text-xl mb-1">{look.title}</h3>
                  <p className="text-xs mb-5" style={{color:'rgba(255,255,255,.5)'}}>{look.desc}</p>
                  <div className="space-y-3">
                    {look.products.map(p => p && (
                      <div key={p.id} className="flex items-center gap-3 rounded-2xl p-3"
                           style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)'}}>
                        <div className="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0">
                          {p.img && <img src={p.img} className="w-full h-full object-cover" alt={p.name}/>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-semibold truncate">{p.name}</p>
                          <p className="text-xs" style={{color:'rgba(255,255,255,.4)'}}>{fmt(p.price)}</p>
                        </div>
                        <button onClick={() => { if(!auth.loggedIn){alert('Debes iniciar sesión');return;} onAdd(p); }}
                                className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0 transition hover:scale-110"
                                style={{background:'rgba(59,89,255,.5)'}}>
                          <i className="fa-solid fa-plus text-xs"></i>
                        </button>
                      </div>
                    ))}
                  </div>
                  <div className="mt-4 pt-4 border-t border-white/10 flex justify-between items-center">
                    <span className="text-xs" style={{color:'rgba(255,255,255,.4)'}}>Total del look</span>
                    <span className="font-black text-lg">{fmt(look.products.reduce((s,p) => s + (p?.price||0), 0))}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const addToCart = (product) => {
        console.log('Agregar al carrito:', product);
        alert(`Producto agregado: ${product.name}`);
      };

      return (
        <div>
          <div className="bg-gray-900 text-white py-4 text-center">
            <h1 className="text-2xl font-bold">Test - Looks del Día</h1>
            <p className="text-sm text-gray-400 mt-1">Verificación de la sección</p>
          </div>
          <LooksDelMes onAdd={addToCart} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
